<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Bot Settings • Ni!</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid var(--line); background: var(--bg-main); color: var(--text-main); box-sizing: border-box; }
    label { font-size: 12px; font-weight: bold; margin-top: 15px; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Bot Profile</h1>
      <p class="muted">These settings control how your bot behaves when TheTelegramChatBotThatSaysNi replies for you. You can safely paste your bot token here. It is handled with AES-256 encryption.</p>
      <form id="profile-form" style="margin-bottom: 10px;">
        <label>YOUR NAME</label>
        <input type="text" id="name" placeholder="e.g. Sir Robin">

        <label>YOUR BOT USERNAME</label>
        <input type="text" id="botUsername" placeholder="e.g. MyBusinessBot (no @)">
        
        <label>BOT INSTRUCTIONS</label>
        <textarea id="instructions" rows="5" placeholder="Tell the bot how to behave..."></textarea>

        <label>BOT API TOKEN</label>
        <input type="password" id="botToken" placeholder="Paste your Telegram bot token from @BotFather">
        
        <button type="submit" class="btn">Save Instructions</button>
      </form>
      <hr>
      <div class="footer-links">
        <a href="/connected" class="btn secondary" style="min-width:auto; padding:8px 18px; font-size:12px;">Back</a>
        <a href="/instructions.html" class="btn secondary" style="min-width:auto; padding:8px 18px; font-size:12px;" target="_blank" rel="noopener noreferrer">Need help? Click for instructions</a>
        <a href="https://github.com/TheDevWhoSaysNi/TheTelegramChatBotThatSaysNi" class="btn github-btn" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 0 0 5.47 7.59c.4.08.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.62 7.62 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
          <span>View Source Code on GitHub</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('profile-form').onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch('/api/save-profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          instructions: document.getElementById('instructions').value,
          botUsername: document.getElementById('botUsername').value,
          botToken: document.getElementById('botToken').value
        })
      });
      if (res.ok) alert('Saved! Ni!');
    };
  </script>
</body>
</html>
