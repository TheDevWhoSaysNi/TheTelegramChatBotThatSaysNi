<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>TheTelegramChatBotThatSaysNi</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>TheTelegramChatBotThatSaysNi</h1>
      <p class="muted">Automate your customer service with efficiency.</p>
      <hr>
      <div id="login-container" style="text-align:center;">
        <!-- Telegram Login widget will be injected by JavaScript using server config -->
      </div>
    </div>
  </div>

  <script>
    // Inject Telegram Login widget using env-backed config
    (async function loadTelegramLogin() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        if (!cfg.telegramBotUsername) {
          document.getElementById('login-container').innerText =
            'Login is not configured. Ask the admin to set TELEGRAM_LOGIN_BOT_USERNAME.';
          return;
        }
        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.setAttribute('data-telegram-login', cfg.telegramBotUsername);
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');
        script.setAttribute('data-request-access', 'write');
        document.getElementById('login-container').appendChild(script);
      } catch (e) {
        console.error('Failed to load Telegram Login widget', e);
        document.getElementById('login-container').innerText =
          'Unable to load Telegram Login right now.';
      }
    })();

    function onTelegramAuth(user) {
      fetch('/api/tg-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
      }).then(r => r.ok ? window.location.href = '/connected' : alert('Login failed!'));
    }
  </script>
</body>
</html>
