# Render Blueprint: deploy Web Service + optional PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ni-telegram-bot
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ni-db
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: ni-db
    plan: free
